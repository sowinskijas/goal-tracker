<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold:       #C6952A;
  --gold-light: #DDB96A;
  --gold-pale:  #f0e4c8;
  --charcoal:   #0d1117;
  --charcoal-2: #161c26;
  --charcoal-3: #1f2733;
  --slate:      #2c3440;
  --text-mid:   #9aa0ac;
  --text-light: #b0b8c4;
  --border:     rgba(198,149,42,0.2);
  --radius:     6px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:"Raleway",sans-serif;
  background:var(--charcoal);
  color:#fff;
  min-height:100vh;
  padding:40px 20px 80px;
}
h1,h2,h3{font-family:"Cormorant Garamond",serif;font-weight:600;}

.container{max-width:520px;margin:0 auto;}

/* Header */
.header{text-align:center;margin-bottom:40px;}
.header h1{font-size:2.4rem;color:#fff;margin-bottom:4px;}
.header h1 span{color:var(--gold);}
.header .date{font-size:0.75rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-mid);margin-bottom:12px;}
.header .streak-row{display:flex;justify-content:center;gap:20px;margin-top:16px;}
.streak-pill{
  background:var(--charcoal-3);
  border:1px solid var(--border);
  border-radius:40px;
  padding:6px 18px;
  font-size:0.75rem;
  font-weight:600;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--text-mid);
}
.streak-pill span{color:var(--gold);font-size:1rem;margin-right:5px;}

/* Rest day toggle */
.rest-toggle{
  display:flex;align-items:center;justify-content:center;gap:12px;
  margin-bottom:32px;
  font-size:0.78rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-mid);
}
.toggle{position:relative;width:44px;height:24px;cursor:pointer;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-track{
  position:absolute;inset:0;
  background:var(--slate);border-radius:24px;
  transition:background 0.2s;
}
.toggle input:checked + .toggle-track{background:var(--gold);}
.toggle-thumb{
  position:absolute;top:3px;left:3px;
  width:18px;height:18px;
  background:#fff;border-radius:50%;
  transition:transform 0.2s;
}
.toggle input:checked ~ .toggle-thumb{transform:translateX(20px);}

/* Cards */
.card{
  background:var(--charcoal-2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px;
  margin-bottom:16px;
}
.card-title{
  font-size:0.7rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--gold);margin-bottom:18px;
}

/* Goal items */
.goal-item{
  display:flex;align-items:center;gap:14px;
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
  cursor:pointer;
  user-select:none;
  transition:opacity 0.15s;
}
.goal-item:last-child{border-bottom:none;padding-bottom:0;}
.goal-item:first-of-type{padding-top:0;}
.goal-item.disabled{opacity:0.35;pointer-events:none;}

.checkbox{
  width:22px;height:22px;flex-shrink:0;
  border:2px solid var(--border);
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.goal-item.checked .checkbox{
  background:var(--gold);
  border-color:var(--gold);
}
.checkbox svg{display:none;width:13px;height:13px;}
.goal-item.checked .checkbox svg{display:block;}

.goal-info{flex:1;}
.goal-name{font-size:0.95rem;font-weight:600;color:#fff;transition:color 0.15s;}
.goal-item.checked .goal-name{color:var(--gold-light);}
.goal-sub{font-size:0.75rem;color:var(--text-mid);margin-top:2px;}

.goal-icon{font-size:1.3rem;width:28px;text-align:center;}

/* Weight section */
.weight-row{display:flex;gap:10px;align-items:flex-end;margin-top:6px;}
.weight-input-wrap{flex:1;}
.weight-input-wrap label{
  display:block;font-size:0.7rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--text-mid);margin-bottom:6px;
}
.weight-input-wrap input{
  width:100%;
  background:var(--charcoal-3);
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:#fff;
  font-family:"Raleway",sans-serif;
  font-size:1.1rem;
  font-weight:600;
  padding:10px 14px;
  outline:none;
  transition:border-color 0.15s;
}
.weight-input-wrap input:focus{border-color:var(--gold);}
.weight-input-wrap input::placeholder{color:var(--slate);}

.log-btn{
  background:var(--gold);
  color:#000;
  border:none;
  border-radius:var(--radius);
  font-family:"Raleway",sans-serif;
  font-size:0.8rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  padding:12px 18px;
  cursor:pointer;
  white-space:nowrap;
  transition:background 0.15s;
}
.log-btn:hover{background:var(--gold-light);}

.weight-history{margin-top:18px;}
.weight-history-title{
  font-size:0.65rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--text-mid);margin-bottom:10px;
}
.weight-entries{display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto;}
.weight-entry{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--charcoal-3);
  border-radius:4px;padding:8px 12px;
  font-size:0.82rem;
}
.weight-entry .w-date{color:var(--text-mid);}
.weight-entry .w-val{font-weight:700;color:var(--gold-light);}
.weight-entry .w-delta{font-size:0.72rem;margin-left:8px;}
.w-delta.up{color:#4caf7d;}
.w-delta.down{color:#e05c5c;}

/* Progress bar */
.progress-wrap{margin-top:20px;}
.progress-label{
  display:flex;justify-content:space-between;
  font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--text-mid);margin-bottom:8px;
}
.progress-bar{height:6px;background:var(--slate);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--gold);border-radius:3px;transition:width 0.4s ease;}

/* Notes */
.notes-area{
  width:100%;min-height:80px;
  background:var(--charcoal-3);
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:#fff;
  font-family:"Raleway",sans-serif;
  font-size:0.88rem;
  padding:12px 14px;
  resize:vertical;
  outline:none;
  transition:border-color 0.15s;
  line-height:1.6;
}
.notes-area:focus{border-color:var(--gold);}
.notes-area::placeholder{color:var(--slate);}
.notes-save{
  margin-top:10px;
  font-size:0.7rem;color:var(--text-mid);
  font-style:italic;
}

/* History section */
.history-grid{display:flex;flex-wrap:wrap;gap:6px;}
.history-day{
  width:32px;height:32px;
  border-radius:4px;
  background:var(--charcoal-3);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:0.65rem;font-weight:600;
  color:var(--text-mid);
  cursor:default;
  position:relative;
}
.history-day.full{background:var(--gold);border-color:var(--gold);color:#000;}
.history-day.partial{background:var(--charcoal-3);border-color:var(--gold);color:var(--gold);}
.history-day.rest-logged{background:var(--slate);border-color:var(--slate);color:var(--text-mid);}
.history-day[title]:hover::after{
  content:attr(title);
  position:absolute;bottom:36px;left:50%;transform:translateX(-50%);
  background:#000;border:1px solid var(--border);
  border-radius:4px;padding:4px 8px;
  font-size:0.65rem;white-space:nowrap;color:#fff;
  pointer-events:none;z-index:10;
}

/* Reset */
.reset-link{
  display:block;text-align:center;margin-top:24px;
  font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--slate);cursor:pointer;
  transition:color 0.15s;
}
.reset-link:hover{color:#e05c5c;}
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="date" id="dateDisplay"></div>
    <h1>Daily <span>Tracker</span></h1>
    <div class="streak-row">
      <div class="streak-pill"><span id="overallStreak">0</span> Day Streak</div>
      <div class="streak-pill"><span id="gymStreak">0</span> Gym Streak</div>
    </div>
  </div>

  <!-- Rest day toggle -->
  <div class="rest-toggle">
    <span>Rest Day</span>
    <label class="toggle">
      <input type="checkbox" id="restToggle">
      <div class="toggle-track"></div>
      <div class="toggle-thumb"></div>
    </label>
  </div>

  <!-- Daily Goals -->
  <div class="card">
    <div class="card-title">Today's Goals</div>

    <div class="goal-item" id="goal-gym" data-key="gym">
      <div class="goal-icon">🏋️</div>
      <div class="goal-info">
        <div class="goal-name">Gym / Soccer</div>
        <div class="goal-sub" id="gym-sub">Workout or play soccer today</div>
      </div>
      <div class="checkbox">
        <svg viewBox="0 0 13 10" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1.5,5 5,8.5 11.5,1.5"/>
        </svg>
      </div>
    </div>

    <div class="goal-item" id="goal-eat" data-key="eat">
      <div class="goal-icon">🥗</div>
      <div class="goal-info">
        <div class="goal-name">Eat Healthy</div>
        <div class="goal-sub">Hit your calories, prioritize protein</div>
      </div>
      <div class="checkbox">
        <svg viewBox="0 0 13 10" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1.5,5 5,8.5 11.5,1.5"/>
        </svg>
      </div>
    </div>

    <div class="goal-item" id="goal-business" data-key="business">
      <div class="goal-icon">💼</div>
      <div class="goal-info">
        <div class="goal-name">Work on Business</div>
        <div class="goal-sub">Build, plan, execute — even 30 min counts</div>
      </div>
      <div class="checkbox">
        <svg viewBox="0 0 13 10" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1.5,5 5,8.5 11.5,1.5"/>
        </svg>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Progress</span>
        <span id="progressLabel">0 / 3</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Weight -->
  <div class="card">
    <div class="card-title">Weight Log</div>
    <div class="weight-row">
      <div class="weight-input-wrap">
        <label for="weightInput">Today's Weight (lbs)</label>
        <input type="number" id="weightInput" placeholder="e.g. 165" step="0.1" min="50" max="400">
      </div>
      <button class="log-btn" id="logWeightBtn">Log</button>
    </div>
    <div class="weight-history" id="weightHistory" style="display:none">
      <div class="weight-history-title">History</div>
      <div class="weight-entries" id="weightEntries"></div>
    </div>
  </div>

  <!-- Notes -->
  <div class="card">
    <div class="card-title">Notes</div>
    <textarea class="notes-area" id="notesArea" placeholder="How are you feeling? What did you eat? Business ideas..."></textarea>
    <div class="notes-save" id="notesSaved"></div>
  </div>

  <!-- 30-day history -->
  <div class="card">
    <div class="card-title">Last 30 Days</div>
    <div class="history-grid" id="historyGrid"></div>
  </div>

  <div class="reset-link" id="resetDay">Reset today's check-ins</div>

</div>

<script>
const TODAY = new Date().toISOString().slice(0,10);

function getData(){
  return JSON.parse(localStorage.getItem('tracker_v2') || '{}');
}
function saveData(d){
  localStorage.setItem('tracker_v2', JSON.stringify(d));
}
function getDay(data, date){
  return data[date] || { gym:false, eat:false, business:false, rest:false, weight:null, notes:'' };
}

// Display date
const dateEl = document.getElementById('dateDisplay');
const d = new Date();
dateEl.textContent = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

// State
let data = getData();
let today = getDay(data, TODAY);

// Rest toggle
const restToggle = document.getElementById('restToggle');
restToggle.checked = today.rest;
updateGymGoal();

restToggle.addEventListener('change', () => {
  today.rest = restToggle.checked;
  if(today.rest) today.gym = false;
  saveToday();
  updateGymGoal();
  render();
});

function updateGymGoal(){
  const gymItem = document.getElementById('goal-gym');
  const gymSub = document.getElementById('gym-sub');
  if(today.rest){
    gymItem.classList.add('disabled');
    gymSub.textContent = 'Rest day — recovery is part of the process';
  } else {
    gymItem.classList.remove('disabled');
    gymSub.textContent = 'Workout or play soccer today';
  }
}

// Goals
['gym','eat','business'].forEach(key => {
  const el = document.getElementById('goal-' + key);
  el.addEventListener('click', () => {
    if(key === 'gym' && today.rest) return;
    today[key] = !today[key];
    saveToday();
    render();
  });
});

// Weight
document.getElementById('logWeightBtn').addEventListener('click', () => {
  const val = parseFloat(document.getElementById('weightInput').value);
  if(!val || val < 50 || val > 400) return;
  today.weight = val;
  saveToday();
  renderWeight();
});

// Notes — autosave on pause
let notesTimer;
document.getElementById('notesArea').addEventListener('input', (e) => {
  clearTimeout(notesTimer);
  document.getElementById('notesSaved').textContent = '';
  notesTimer = setTimeout(() => {
    today.notes = e.target.value;
    saveToday();
    document.getElementById('notesSaved').textContent = 'Saved';
    setTimeout(() => document.getElementById('notesSaved').textContent = '', 2000);
  }, 800);
});

// Reset
document.getElementById('resetDay').addEventListener('click', () => {
  if(!confirm('Reset today\'s check-ins?')) return;
  today = { gym:false, eat:false, business:false, rest:false, weight:today.weight, notes:today.notes };
  restToggle.checked = false;
  saveToday();
  render();
  updateGymGoal();
});

function saveToday(){
  data[TODAY] = today;
  saveData(data);
}

function render(){
  // Goals
  ['gym','eat','business'].forEach(key => {
    const el = document.getElementById('goal-' + key);
    el.classList.toggle('checked', !!today[key]);
  });

  // Progress
  const total = today.rest ? 2 : 3;
  const done = (today.rest ? 0 : (today.gym ? 1 : 0)) + (today.eat ? 1 : 0) + (today.business ? 1 : 0);
  const active = today.rest ? done : done;
  const activeDone = (today.rest ? 0 : (today.gym?1:0)) + (today.eat?1:0) + (today.business?1:0);
  document.getElementById('progressLabel').textContent = activeDone + ' / ' + total;
  document.getElementById('progressFill').style.width = (activeDone/total*100) + '%';

  // Streaks
  renderStreaks();
  renderHistory();
}

function renderWeight(){
  const input = document.getElementById('weightInput');
  if(today.weight) input.value = today.weight;

  const entries = Object.entries(data)
    .filter(([,v]) => v.weight)
    .sort(([a],[b]) => b.localeCompare(a))
    .slice(0,15);

  const histEl = document.getElementById('weightHistory');
  const listEl = document.getElementById('weightEntries');

  if(!entries.length){ histEl.style.display='none'; return; }
  histEl.style.display='block';
  listEl.innerHTML = entries.map(([date, v], i) => {
    const prev = entries[i+1];
    let deltaHtml = '';
    if(prev && prev[1].weight){
      const diff = (v.weight - prev[1].weight).toFixed(1);
      const cls = diff >= 0 ? 'up' : 'down';
      const sign = diff >= 0 ? '+' : '';
      deltaHtml = `<span class="w-delta ${cls}">${sign}${diff}</span>`;
    }
    const label = date === TODAY ? 'Today' : new Date(date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return `<div class="weight-entry"><span class="w-date">${label}</span><span class="w-val">${v.weight} lbs${deltaHtml}</span></div>`;
  }).join('');
}

function renderStreaks(){
  // Overall streak: every day all active goals done
  // Gym streak: every non-rest day gym done
  let dates = Object.keys(data).sort().reverse();
  let overall = 0, gym = 0;
  let overallBroken = false, gymBroken = false;

  // build list of last N days
  for(let i=0; i<90; i++){
    const date = new Date();
    date.setDate(date.getDate() - i);
    const key = date.toISOString().slice(0,10);
    const day = data[key];
    if(!day){ if(i > 0){ overallBroken=true; gymBroken=true; } break; }

    if(!overallBroken){
      const total = day.rest ? 2 : 3;
      const done = (day.rest?0:(day.gym?1:0))+(day.eat?1:0)+(day.business?1:0);
      if(done >= total) overall++;
      else if(i > 0) overallBroken = true;
    }
    if(!gymBroken){
      if(day.rest) gym++;
      else if(day.gym) gym++;
      else if(i > 0) gymBroken = true;
    }
  }
  document.getElementById('overallStreak').textContent = overall;
  document.getElementById('gymStreak').textContent = gym;
}

function renderHistory(){
  const grid = document.getElementById('historyGrid');
  const cells = [];
  for(let i=29; i>=0; i--){
    const date = new Date();
    date.setDate(date.getDate() - i);
    const key = date.toISOString().slice(0,10);
    const day = data[key];
    const label = date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const dayNum = date.getDate();

    let cls = '', title = label;
    if(day){
      if(day.rest){
        cls = 'rest-logged';
        title = label + ' — Rest day';
      } else {
        const done = (day.gym?1:0)+(day.eat?1:0)+(day.business?1:0);
        if(done === 3){ cls='full'; title=label+' — Perfect day'; }
        else if(done > 0){ cls='partial'; title=label+` — ${done}/3`; }
      }
    }
    cells.push(`<div class="history-day ${cls}" title="${title}">${dayNum}</div>`);
  }
  grid.innerHTML = cells.join('');
}

// Notes restore
document.getElementById('notesArea').value = today.notes || '';

// Init
render();
renderWeight();
</script>
</body>
</html>
